name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]  # Runs daily at midnight
  workflow_dispatch:                 # Manual trigger
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
